<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Resultado de Predicción</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-xl shadow-lg text-center max-w-md">
    <h1 class="text-2xl font-bold text-gray-800 mb-4">Resultado de la Predicción</h1>
    
    <img src="{{ imagen }}" alt="Imagen subida" class="w-64 h-64 object-cover mx-auto rounded-md mb-4 border">
    
    <p class="text-lg text-gray-700">La imagen fue clasificada como:</p>
    <p class="text-2xl font-semibold text-blue-600 mt-2">{{ resultado }}</p>

    <a href="/" class="mt-6 inline-block bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 transition">Volver</a>
  </div>
</body>
</html>
