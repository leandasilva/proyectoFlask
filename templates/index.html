<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Clasificador de Imágenes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-xl shadow-lg max-w-md w-full text-center">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Subí una imagen (.jpg / .jpeg)</h1>

    <form action="/predecir" method="POST" enctype="multipart/form-data" class="space-y-4">
      <input 
        type="file" 
        name="imagen" 
        accept=".jpg,.jpeg" 
        required 
        onchange="previewImagen(event)"
        class="w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"
      >

      <div id="preview-container" class="mt-4 hidden">
        <p class="text-gray-700 mb-2">Vista previa:</p>
        <img id="preview" src="" alt="Vista previa" class="w-64 h-64 object-cover mx-auto rounded-md border">
      </div>

      <button 
        type="submit" 
        class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded transition"
      >
        Predecir
      </button>
    </form>
  </div>

  <script>
    function previewImagen(event) {
      const input = event.target;
      const file = input.files[0];
      const preview = document.getElementById('preview');
      const container = document.getElementById('preview-container');

      if (file && /\.(jpe?g)$/i.test(file.name)) {
        const reader = new FileReader();
        reader.onload = function (e) {
          preview.src = e.target.result;
          container.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      } else {
        preview.src = '';
        container.classList.add('hidden');
        alert('Solo se permiten archivos .jpg o .jpeg');
        input.value = '';
      }
    }
  </script>
</body>
</html>
